<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Académico</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Montserrat:wght@300;400;500&display=swap');

    :root {
      --bg: #0d0f12;
      --surface: #161921;
      --surface2: #1e2230;
      --border: #2a2f3d;
      --text: #e8eaf2;
      --muted: #6b7694;
      --accent: #5b8fff;
      --green: #3dd68c;
      --yellow: #f5c842;
      --red: #ff5f6e;
      --orange: #ff9f43;
      --purple: #a78bfa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', monospace;
      min-height: 100vh;
      padding: 20px 16px 80px;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: var(--accent);
    }

    .header-btns {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Montserrat', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn.outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .materias-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .materia-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .materia-card.completada {
      border-color: var(--green);
    }

    .materia-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 18px;
      background: var(--surface2);
      cursor: pointer;
      user-select: none;
      flex-wrap: wrap;
    }

    .materia-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .toggle-arrow {
      font-size: 0.65rem;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .toggle-arrow.open {
      transform: rotate(90deg);
    }

    .materia-name-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 700;
      width: 100%;
      outline: none;
      cursor: pointer;
      min-width: 0;
    }

    .materia-name-input:focus {
      cursor: text;
    }

    .materia-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .pct-badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.3s;
    }

    .pct-badge.done {
      background: rgba(61, 214, 140, 0.15);
      border-color: var(--green);
      color: var(--green);
    }

    .materia-date-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
    }

    .materia-date-label {
      color: var(--muted);
      flex-shrink: 0;
    }

    .materia-date-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Montserrat', monospace;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      color-scheme: dark;
      transition: border-color 0.15s;
    }

    .materia-date-input:focus {
      border-color: var(--accent);
    }

    .materia-date-input.date-verde {
      color: var(--green);
      border-color: rgba(61, 214, 140, 0.4);
    }

    .materia-date-input.date-amarillo {
      color: var(--yellow);
      border-color: rgba(245, 200, 66, 0.4);
    }

    .materia-date-input.date-rojo {
      color: var(--red);
      border-color: rgba(255, 95, 110, 0.4);
    }

    .btn-del-materia {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.68rem;
      padding: 3px 9px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Montserrat', monospace;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .btn-del-materia:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      transition: width 0.5s ease;
    }

    .progress-bar-fill.done {
      background: linear-gradient(90deg, var(--green), #6ee7b7);
    }

    .materia-body {
      padding: 10px 8px 14px;
    }

    .collapse-body.hidden {
      display: none;
    }

    .col-headers,
    .actividad-row {
      display: grid;
      grid-template-columns: 1fr 0.6fr 0.3fr 36px;
      gap: 8px;
      align-items: center;
    }

    @media (min-width: 520px) {

      .col-headers,
      .actividad-row {
        grid-template-columns: 2fr 1.1fr 0.65fr 36px;
      }
    }

    .col-headers {
      padding: 5px 0;
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .actividad-row {
      padding: 6px 0;
      border-bottom: 1px solid rgba(42, 47, 61, 0.4);
      border-radius: 6px;
      transition: background 0.2s;
    }

    .actividad-row.completada-row {
      background: rgba(61, 214, 140, 0.04);
    }

    .actividad-row.completada-row .act-nombre {
      text-decoration: line-through;
      color: var(--muted);
    }

    .cell-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Montserrat', monospace;
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      width: 100%;
      outline: none;
      padding: 3px 6px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .cell-input:focus {
      background: var(--surface2);
    }

    .cell-input::placeholder {
      color: var(--border);
    }

    select.cell-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Montserrat', monospace;
      font-size: clamp(0.66rem, 2vw, 0.74rem);
      padding: 3px 5px;
      border-radius: 6px;
      width: 100%;
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    select.cell-select:focus {
      border-color: var(--accent);
    }

    select.cell-select.dif-baja {
      color: #74c0fc;
    }

    select.cell-select.dif-media {
      color: var(--yellow);
    }

    select.cell-select.dif-alta {
      color: var(--orange);
    }

    select.cell-select.dif-esa {
      color: var(--red);
    }

    .check-done {
      width: 17px;
      height: 17px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .row-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .btn-del {
      background: transparent;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
      line-height: 1;
    }

    .btn-del:hover {
      color: var(--red);
    }

    .btn-add-act {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-family: 'Montserrat', monospace;
      font-size: 0.75rem;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.15s;
      width: 100%;
      justify-content: center;
    }

    .btn-add-act:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .modal p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.65;
    }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Montserrat', monospace;
      font-size: 0.82rem;
      padding: 9px 13px;
      border-radius: 8px;
      outline: none;
      margin-bottom: 12px;
      display: block;
    }

    .modal input:focus {
      border-color: var(--accent);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btns button {
      font-family: 'Montserrat', monospace;
      font-size: 0.78rem;
      padding: 8px 18px;
      border-radius: 7px;
      cursor: pointer;
      border: none;
    }

    .btn-cancel {
      background: var(--surface2);
      color: var(--muted);
    }

    .btn-confirm {
      background: var(--accent);
      color: #fff;
    }

    /* Toast de guardado */
    .save-toast {
      position: fixed;
      bottom: 24px;
      right: 20px;
      background: var(--surface2);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 0.72rem;
      padding: 7px 14px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }

    .save-toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <header>
    <h1>📚 Tracker <span>Académico</span></h1>
    <div class="header-btns">
      <button class="btn" onclick="showAddMateriaModal()">+ Agregar Materia</button>
    </div>
  </header>

  <div class="legend">
    <span class="legend-item"><span class="dot" style="background:#74c0fc"></span> Baja ×1</span>
    <span class="legend-item"><span class="dot" style="background:var(--yellow)"></span> Media ×2</span>
    <span class="legend-item"><span class="dot" style="background:var(--orange)"></span> Alta ×3.5</span>
    <span class="legend-item"><span class="dot" style="background:var(--red)"></span> ¡Esa mondá! ×6</span>
    <span style="flex-basis:100%;height:0"></span>
    <span class="legend-item"><span class="dot" style="background:var(--green)"></span> Fecha OK</span>
    <span class="legend-item"><span class="dot" style="background:var(--yellow)"></span> &lt;7 días</span>
    <span class="legend-item"><span class="dot" style="background:var(--red)"></span> &lt;3 días / vencida</span>
  </div>

  <div class="materias-list" id="materiasList"></div>

  <!-- Toast -->
  <div class="save-toast" id="saveToast">✓ Guardado</div>

  <!-- Modal nueva materia -->
  <div class="modal-overlay" id="modalMateria">
    <div class="modal">
      <h3>Nueva Materia</h3>
      <input type="text" id="inputMateria" placeholder="Nombre de la materia..."
        onkeydown="if(event.key==='Enter')confirmMateria()">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('modalMateria')">Cancelar</button>
        <button class="btn-confirm" onclick="confirmMateria()">Agregar</button>
      </div>
    </div>
  </div>

  <script>
    const WEIGHTS = { Baja: 1, Media: 2, Alta: 3.5, '¡Esa mondá qué!': 6 };
    const STORAGE_KEY = 'tracker_data_v2';

    // ── UID estable (no se regenera en cada carga) ──
    function uid() { return Math.random().toString(36).slice(2, 10); }

    // DEFAULT_DATA solo se usa si no hay nada en localStorage
    function getDefaultData() {
      return [
        {
          id: 'default_01',
          nombre: 'Molestar a Santi',
          open: true,
          fecha: '2026-04-14',
          actividades: [
            { id: 'act_01', nombre: 'Pedirle audio de Porta', dificultad: 'Baja', duracion: '0.5', realizado: false },
            { id: 'act_02', nombre: 'Burlarse del oso polar', dificultad: 'Media', duracion: '0.5', realizado: false },
            { id: 'act_04', nombre: 'Ganarle en rebotes', dificultad: '¡Esa mondá qué!', duracion: '0.5', realizado: false },
            { id: 'act_05', nombre: 'Fijar mensaje 8 días más', dificultad: 'Alta', duracion: '0.5', realizado: false },
            { id: 'act_03', nombre: 'Ya dije lo de Porta?', dificultad: 'Alta', duracion: '0.5', realizado: false },
          ]
        }
      ];
    }

    // ── Carga inicial segura ──
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        }
      } catch (e) {
        console.warn('Error leyendo localStorage, usando datos por defecto.', e);
      }
      return getDefaultData();
    }

    let data = loadData();

    // ── Guardado inmediato (sin debounce para localStorage) ──
    let toastTimer;
    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        // Toast de confirmación
        const toast = document.getElementById('saveToast');
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
      } catch (e) {
        console.error('Error guardando en localStorage:', e);
        alert('⚠️ No se pudo guardar. Tu navegador puede tener el almacenamiento bloqueado o lleno.');
      }
    }

    // ── CALC ──
    function calcPct(actividades) {
      const withW = actividades.filter(a => WEIGHTS[a.dificultad] != null);
      if (!withW.length) {
        const t = actividades.length;
        return t ? Math.round(actividades.filter(a => a.realizado).length / t * 100) : 0;
      }
      const total = withW.reduce((s, a) => s + WEIGHTS[a.dificultad], 0);
      const done = withW.filter(a => a.realizado).reduce((s, a) => s + WEIGHTS[a.dificultad], 0);
      return total ? Math.round(done / total * 100) : 0;
    }

    function dateClass(dateStr) {
      if (!dateStr) return '';
      const now = new Date(); now.setHours(0, 0, 0, 0);
      const diff = Math.ceil((new Date(dateStr + 'T00:00:00') - now) / 86400000);
      if (diff <= 3) return 'date-rojo';
      if (diff <= 7) return 'date-amarillo';
      return 'date-verde';
    }

    // ── RENDER ──
    function renderAll() {
      const list = document.getElementById('materiasList');
      list.innerHTML = '';
      data.forEach(m => list.appendChild(buildCard(m)));
    }

    function buildCard(m) {
      const pct = calcPct(m.actividades);
      const done = pct >= 100;

      const card = document.createElement('div');
      card.className = 'materia-card' + (done ? ' completada' : '');
      card.dataset.id = m.id;

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'materia-header';
      hdr.onclick = e => {
        if (['INPUT', 'SELECT'].includes(e.target.tagName)) return;
        m.open = !m.open; save(); renderAll();
      };

      const left = document.createElement('div');
      left.className = 'materia-left';

      const arrow = document.createElement('span');
      arrow.className = 'toggle-arrow' + (m.open ? ' open' : '');
      arrow.textContent = '▶';

      const nameInp = document.createElement('input');
      nameInp.className = 'materia-name-input';
      nameInp.value = m.nombre;
      nameInp.placeholder = 'Nombre materia...';
      nameInp.onchange = e => { m.nombre = e.target.value; save(); };

      left.appendChild(arrow);
      left.appendChild(nameInp);

      const meta = document.createElement('div');
      meta.className = 'materia-meta';

      const dateWrap = document.createElement('div');
      dateWrap.className = 'materia-date-wrap';

      const dateLabel = document.createElement('span');
      dateLabel.className = 'materia-date-label';
      dateLabel.textContent = '📅';

      const dateInp = document.createElement('input');
      dateInp.type = 'date';
      dateInp.className = 'materia-date-input ' + dateClass(m.fecha);
      dateInp.value = m.fecha || '';
      dateInp.onchange = e => { m.fecha = e.target.value; save(); renderAll(); };

      dateWrap.appendChild(dateLabel);
      dateWrap.appendChild(dateInp);

      const pctBadge = document.createElement('span');
      pctBadge.className = 'pct-badge' + (done ? ' done' : '');
      pctBadge.textContent = pct + '%';

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del-materia';
      delBtn.textContent = '✕';
      delBtn.title = 'Eliminar materia';
      delBtn.onclick = e => {
        e.stopPropagation();
        if (confirm('¿Eliminar "' + m.nombre + '"?')) {
          data = data.filter(x => x.id !== m.id); save(); renderAll();
        }
      };

      meta.appendChild(dateWrap);
      meta.appendChild(pctBadge);
      meta.appendChild(delBtn);

      hdr.appendChild(left);
      hdr.appendChild(meta);

      // Progress bar
      const pbWrap = document.createElement('div');
      pbWrap.className = 'progress-bar-wrap';
      const pbFill = document.createElement('div');
      pbFill.className = 'progress-bar-fill' + (done ? ' done' : '');
      pbFill.style.width = pct + '%';
      pbWrap.appendChild(pbFill);

      // Body
      const body = document.createElement('div');
      body.className = 'materia-body collapse-body' + (m.open ? '' : ' hidden');

      const colH = document.createElement('div');
      colH.className = 'col-headers';
      colH.innerHTML = '<span>Actividad</span><span>Dificultad</span><span>Hrs</span><span></span>';
      body.appendChild(colH);

      m.actividades.forEach(act => body.appendChild(buildRow(m, act)));

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-act';
      addBtn.innerHTML = '＋ Agregar actividad';
      addBtn.onclick = () => {
        m.actividades.push({ id: uid(), nombre: '', dificultad: '', duracion: '', realizado: false });
        save(); renderAll();
        setTimeout(() => {
          const c = document.querySelector(`[data-id="${m.id}"]`);
          if (c) { const ins = c.querySelectorAll('.act-nombre'); ins[ins.length - 1]?.focus(); }
        }, 40);
      };
      body.appendChild(addBtn);

      card.appendChild(hdr);
      card.appendChild(pbWrap);
      card.appendChild(body);
      return card;
    }

    function buildRow(m, act) {
      const row = document.createElement('div');
      row.className = 'actividad-row' + (act.realizado ? ' completada-row' : '');

      const nombre = document.createElement('input');
      nombre.className = 'cell-input act-nombre';
      nombre.value = act.nombre;
      nombre.placeholder = 'Actividad...';
      nombre.onchange = e => { act.nombre = e.target.value; save(); };

      const difClsMap = { Baja: 'dif-baja', Media: 'dif-media', Alta: 'dif-alta', '¡Esa mondá qué!': 'dif-esa' };
      const dif = document.createElement('select');
      dif.className = 'cell-select ' + (difClsMap[act.dificultad] || '');
      ['', 'Baja', 'Media', 'Alta', '¡Esa mondá qué!'].forEach(o => {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o || '—';
        if (o === act.dificultad) opt.selected = true;
        dif.appendChild(opt);
      });
      dif.onchange = e => {
        act.dificultad = e.target.value;
        dif.className = 'cell-select ' + (difClsMap[e.target.value] || '');
        save(); renderAll();
      };

      const dur = document.createElement('input');
      dur.className = 'cell-input';
      dur.value = act.duracion;
      dur.placeholder = '0';
      dur.type = 'number';
      dur.min = '0';
      dur.step = '0.5';
      dur.onchange = e => { act.duracion = e.target.value; save(); };

      const actions = document.createElement('div');
      actions.className = 'row-actions';

      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'check-done';
      chk.checked = act.realizado;
      chk.onchange = e => { act.realizado = e.target.checked; save(); renderAll(); };

      const del = document.createElement('button');
      del.className = 'btn-del';
      del.title = 'Eliminar';
      del.innerHTML = '✕';
      del.onclick = () => { m.actividades = m.actividades.filter(x => x.id !== act.id); save(); renderAll(); };

      actions.appendChild(chk);
      actions.appendChild(del);

      row.appendChild(nombre);
      row.appendChild(dif);
      row.appendChild(dur);
      row.appendChild(actions);
      return row;
    }

    // ── MODALS ──
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    function showAddMateriaModal() {
      document.getElementById('inputMateria').value = '';
      openModal('modalMateria');
      setTimeout(() => document.getElementById('inputMateria').focus(), 50);
    }

    function confirmMateria() {
      const val = document.getElementById('inputMateria').value.trim();
      if (!val) return;
      data.push({ id: uid(), nombre: val, open: true, fecha: '', actividades: [] });
      save(); renderAll();
      closeModal('modalMateria');
    }

    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.onclick = e => { if (e.target === el) el.classList.remove('show'); };
    });

    // ── INIT ──
    renderAll();
  </script>
</body>

</html>
