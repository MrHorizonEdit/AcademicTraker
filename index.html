<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Académico</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>📚 Tracker <span>Académico</span></h1>
    <div class="header-btns">
      <button class="btn" onclick="showAddMateriaModal()">+ Agregar Materia</button>
    </div>
  </header>

  <div class="legend">
    <span class="legend-item"><span class="dot" style="background:#74c0fc"></span> Baja ×1</span>
    <span class="legend-item"><span class="dot" style="background:var(--yellow)"></span> Media ×2</span>
    <span class="legend-item"><span class="dot" style="background:var(--orange)"></span> Alta ×3.5</span>
    <span class="legend-item"><span class="dot" style="background:var(--red)"></span> ¡Esa mondá! ×6</span>
    <span style="flex-basis:100%;height:0"></span>
    <span class="legend-item"><span class="dot" style="background:var(--green)"></span> Fecha OK</span>
    <span class="legend-item"><span class="dot" style="background:var(--yellow)"></span> &lt;7 días</span>
    <span class="legend-item"><span class="dot" style="background:var(--red)"></span> &lt;3 días / vencida</span>
  </div>

  <div class="materias-list" id="materiasList"></div>

  <!-- Toast -->
  <div class="save-toast" id="saveToast">✓ Guardado</div>

  <!-- Modal nueva materia -->
  <div class="modal-overlay" id="modalMateria">
    <div class="modal">
      <h3>Nueva Materia</h3>
      <input type="text" id="inputMateria" placeholder="Nombre de la materia..."
        onkeydown="if(event.key==='Enter')confirmMateria()">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('modalMateria')">Cancelar</button>
        <button class="btn-confirm" onclick="confirmMateria()">Agregar</button>
      </div>
    </div>
  </div>

  <script src="tracker.js"></script>
</body>

</html>
